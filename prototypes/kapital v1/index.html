<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kapital</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow: auto; }
  canvas { display: block; image-rendering: pixelated; max-width: 100vw; max-height: 100vh; width: auto; height: auto; }
  #wrap { position: relative; display: inline-block; }
  #fs { position: absolute; bottom: 6px; right: 6px; width: 28px; height: 28px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 9; padding: 0; }
  #fs:hover { background: rgba(220,220,220,0.25); border-color: #dddddd; }
  #fs svg { width: 16px; height: 16px; fill: #dddddd; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <button id="fs" title="Fullscreen">
    <svg id="fs-expand" viewBox="0 0 16 16"><path d="M1 1h4v2H3v2H1zm10 0h4v4h-2V3h-2zM1 11h2v2h2v2H1zm12 2h-2v2h4v-4h-2z"/></svg>
    <svg id="fs-shrink" viewBox="0 0 16 16" style="display:none"><path d="M5 1v4H1V3h2V1zm6 0h2v2h2v2h-4zm-6 10H1v-2h4zm6 0v4h-2v-2H7v-2zm-8 0H1v4h4v-2H3z"/></svg>
  </button>
</div>

<!-- Game modules (load order matters) -->
<script src="js/constants.js"></script>
<script src="js/grid.js"></script>
<script src="js/animation.js"></script>
<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/input.js"></script>

<!-- Fullscreen button -->
<script>
  const fsBtn    = document.getElementById('fs');
  const expandIc = document.getElementById('fs-expand');
  const shrinkIc = document.getElementById('fs-shrink');
  const wrap     = document.getElementById('wrap');
  const canvasEl = document.getElementById('c');

  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) wrap.requestFullscreen();
    else document.exitFullscreen();
  });

  document.addEventListener('fullscreenchange', () => {
    const fs = !!document.fullscreenElement;
    expandIc.style.display = fs ? 'none' : '';
    shrinkIc.style.display = fs ? '' : 'none';
    if (fs) {
      wrap.style.cssText     = 'position:relative;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;background:#000;';
      canvasEl.style.cssText = 'display:block;image-rendering:pixelated;max-width:100vw;max-height:100vh;width:auto;height:auto;';
    } else {
      wrap.style.cssText     = 'position:relative;display:inline-block;';
      canvasEl.style.cssText = 'display:block;image-rendering:pixelated;max-width:100vw;max-height:100vh;width:auto;height:auto;';
    }
  });
</script>
</body>
</html>
